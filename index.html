<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shared Message Board</title>

<style>
body{
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 30px;
}

.board{
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.card{
  background: #1e293b;
  color: white;
  padding: 10px;
  border-radius: 6px;
  word-wrap: break-word;
}

button{
  margin-top: 15px;
  padding: 8px 12px;
  background: #3b82f6;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

input{
  padding: 6px;
  width: 300px;
  border-radius: 4px;
  border: none;
  margin-right: 5px;
}
</style>
</head>

<body>

<h1>Shared Message Board</h1>

<div id="board" class="board"></div>

<div style="margin-top:20px;">
  <input type="text" id="messageInput" placeholder="Enter your message..." />
  <button id="addBtn">Add Message</button>
</div>

<script>
// GitHub repo info
const USER = "timothylovesyou";
const REPO = "madeforangel";
const boardEl = document.getElementById('board');

// Load messages from GitHub Issues
async function loadMessages(){
  try {
    const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/issues`);
    const issues = await res.json();

    boardEl.innerHTML = '';
    issues.reverse().forEach(issue => { // newest first
      const card = document.createElement('div');
      card.className = 'card';
      card.innerText = issue.title;
      boardEl.appendChild(card);
    });
  } catch(e) {
    console.error("Failed to load messages:", e);
  }
}

// Add new message via GitHub Issues
document.getElementById('addBtn').addEventListener('click', () => {
  const title = document.getElementById('messageInput').value.trim();
  if(!title) return;

  const url = `https://github.com/${USER}/${REPO}/issues/new?title=${encodeURIComponent(title)}`;
  window.open(url, "_blank");
  document.getElementById('messageInput').value = '';
});

// Load messages initially
loadMessages();

// Auto-refresh every 2 seconds
setInterval(loadMessages, 2000);
</script>

</body>
</html>
