<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WhatsApp-Style Private Chat</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ------------------- WhatsApp Inspired CSS ------------------- */
html { box-sizing: border-box; height: 100%; margin: 0; padding: 0; }
body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; font-family: "Roboto", sans-serif; margin:0; padding:0; height:100%; background:#0f172a; color:white;}
.chat { height: calc(100% - 69px); }
.chat-container { height: 100%; }
.user-bar { height: 55px; background: #005e54; color: #fff; padding: 0 8px; font-size: 24px; position: relative; z-index: 1;}
.user-bar:after { content: ""; display: table; clear: both;}
.user-bar div { float: left; transform: translateY(-50%); position: relative; top: 50%; }
.user-bar .actions { float: right; margin: 0 0 0 20px; }
.user-bar .avatar { margin: 0 0 0 5px; width: 36px; height: 36px; }
.user-bar .avatar img { border-radius: 50%; display:block; width:100%; }
.user-bar .name { font-size: 17px; font-weight: 600; text-overflow: ellipsis; margin: 0 0 0 8px; overflow: hidden; white-space: nowrap; }
.user-bar .status { display: block; font-size: 13px; font-weight: 400; }
.conversation { height: calc(100vh - 55px); position: relative; z-index: 0; background: #efe7dd; overflow: hidden;}
.conversation .conversation-container { height: calc(100vh - 120px); overflow-y: auto; padding:10px; }
.message { clear: both; line-height: 18px; font-size: 15px; padding: 8px; position: relative; margin: 8px 0; max-width: 80%; word-wrap: break-word; border-radius:15px; color:white; }
.message .time { font-size:11px; color:#ccc; position:absolute; bottom:-15px; right:10px;}
.message.received { background: #fff; color:#000; float:left; border-radius:0px 5px 5px 5px;}
.message.sent { float:right; border-radius:5px 0px 5px 5px;}
input { padding:8px; border-radius:10px; border:none; flex:1; margin-right:5px; }
button { padding:8px 12px; border-radius:10px; border:none; cursor:pointer; }
#sendBtn { background:#3b82f6; color:white; }
#logoutBtn { background:#ef4444; color:white; margin-bottom:10px; }
#clearBtn { background:#f97316; color:white; margin-left:5px; }
/* ------------------- End CSS ------------------- */
</style>
</head>
<body>

<div class="user-bar">
  <div class="name">Private Chat</div>
  <div class="actions">
    <button id="logoutBtn">Logout</button>
    <button id="clearBtn">Clear Chat</button>
  </div>
</div>

<div class="conversation">
  <div class="conversation-container" id="chatContainer"></div>
</div>

<div class="conversation-compose">
  <input type="text" id="messageInput" placeholder="Type a message...">
  <button id="sendBtn"><i class="fa fa-paper-plane"></i> Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

// ---------------- User login ----------------
let user = sessionStorage.getItem('user');
while(!user || (user !== "mysecret123" && user !== "mysecret345")) {
  user = prompt("Enter user (mysecret123 or mysecret345):");
}
sessionStorage.setItem('user', user);

// ---------------- Firebase Config ----------------
const firebaseConfig = {
  apiKey: "AIzaSyD7vdMG0fJ8x68pVVbgwgr6tWWrHIp6Ww8",
  authDomain: "trello-board-da1f2.firebaseapp.com",
  databaseURL: "https://trello-board-da1f2-default-rtdb.firebaseio.com/",
  projectId: "trello-board-da1f2",
  storageBucket: "trello-board-da1f2.appspot.com",
  messagingSenderId: "275400958391",
  appId: "1:275400958391:web:1c9ab00bfe825b31284832"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const chatContainer = document.getElementById('chatContainer');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const logoutBtn = document.getElementById('logoutBtn');
const clearBtn = document.getElementById('clearBtn');

// ---------------- Bubble colors ----------------
const colors = { "mysecret123": "#3b82f6", "mysecret345": "#10b981" };

// Clear Chat only for mysecret345
if(user !== "mysecret345") clearBtn.style.display = 'none';

// ---------------- Send message ----------------
sendBtn.addEventListener('click', () => {
  const text = messageInput.value.trim();
  if(!text) return;
  push(ref(db,'messages'), { text:text, user:user, timestamp: Date.now() });
  messageInput.value='';
});

// ---------------- Logout ----------------
logoutBtn.addEventListener('click', ()=>{
  sessionStorage.removeItem('user');
  location.reload();
});

// ---------------- Clear chat ----------------
clearBtn.addEventListener('click', ()=>{
  if(confirm("Are you sure to clear chat?")) {
    remove(ref(db,'messages')).then(()=>alert("Chat cleared!"));
  }
});

// ---------------- Real-time messages ----------------
const messagesRef = ref(db,'messages');
onValue(messagesRef, snapshot=>{
  const messages = snapshot.val() || {};
  chatContainer.innerHTML='';
  Object.values(messages)
    .sort((a,b)=>a.timestamp - b.timestamp)
    .forEach(msg=>{
      const div = document.createElement('div');
      div.className='message '+(msg.user===user?'sent':'received');
      div.style.background = colors[msg.user] || "#ccc";
      div.textContent = msg.text;

      // timestamp
      const timeSpan = document.createElement('span');
      timeSpan.className='time';
      const date = new Date(msg.timestamp);
      timeSpan.textContent = date.getHours().toString().padStart(2,'0')+':'+date.getMinutes().toString().padStart(2,'0');
      div.appendChild(timeSpan);

      chatContainer.appendChild(div);
    });
  chatContainer.scrollTop = chatContainer.scrollHeight;
});
</script>
</body>
</html>
