<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Private Firebase Message Board</title>
<style>
body{
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 30px;
}
.board{
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-width: 500px;
}
.card{
  background: #1e293b;
  color: white;
  padding: 10px;
  border-radius: 6px;
  word-wrap: break-word;
}
input{
  padding: 6px;
  width: 300px;
  border-radius: 4px;
  border: none;
  margin-right: 5px;
}
button{
  padding: 8px 12px;
  background: #3b82f6;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>Private Firebase Message Board</h1>

<div id="board" class="board"></div>

<div style="margin-top:20px;">
  <input id="messageInput" placeholder="Type your message..." />
  <button id="sendBtn">Send</button>
</div>

<!-- Firebase SDKs -->
<script type="module">
  // Import Firebase modules
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

  // Your Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyD7vdMG0fJ8x68pVVbgwgr6tWWrHIp6Ww8",
    authDomain: "trello-board-da1f2.firebaseapp.com",
    projectId: "trello-board-da1f2",
    storageBucket: "trello-board-da1f2.firebasestorage.app",
    messagingSenderId: "275400958391",
    appId: "1:275400958391:web:1c9ab00bfe825b31284832",
    measurementId: "G-1TGH7ZEB6J"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const boardEl = document.getElementById('board');
  const inputEl = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');

  // Send message
  sendBtn.addEventListener('click', () => {
    const text = inputEl.value.trim();
    if (!text) return;
    push(ref(db, 'messages'), { text: text, timestamp: Date.now() });
    inputEl.value = '';
  });

  // Listen for new messages
  const messagesRef = ref(db, 'messages');
  onValue(messagesRef, snapshot => {
    const messages = snapshot.val() || {};
    boardEl.innerHTML = '';
    Object.values(messages)
      .sort((a, b) => a.timestamp - b.timestamp) // oldest first
      .forEach(msg => {
        const div = document.createElement('div');
        div.className = 'card';
        div.textContent = msg.text;
        boardEl.appendChild(div);
      });
  });
</script>

</body>
</html>
