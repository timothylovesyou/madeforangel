<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Private Two-User Chat</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  padding: 30px;
}
#chatContainer {
  max-width: 500px;
  margin: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
  border: 1px solid #1e293b;
  padding: 10px;
  border-radius: 10px;
  height: 400px;
  overflow-y: auto;
  background: #1e293b;
}
.message {
  padding: 8px 12px;
  border-radius: 15px;
  max-width: 80%;
  word-wrap: break-word;
  position: relative;
  color: white;
}
.message .time {
  font-size: 10px;
  color: #ccc;
  position: absolute;
  bottom: -15px;
  right: 10px;
}
#inputArea {
  display: flex;
  justify-content: space-between;
  margin-top: 15px;
  max-width: 500px;
  margin-left: auto;
  margin-right: auto;
}
#messageInput {
  flex: 1;
  padding: 8px;
  border-radius: 10px;
  border: none;
  margin-right: 5px;
}
button {
  padding: 8px 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}
#sendBtn { background: #3b82f6; color:white; }
#logoutBtn { background: #ef4444; color:white; margin-bottom: 10px; }
#clearBtn { background: #f97316; color:white; margin-left:5px; }
</style>
</head>
<body>

<h1>Private Two-User Chat</h1>
<button id="logoutBtn">Logout</button>

<div id="chatContainer"></div>

<div id="inputArea" style="display:none;">
  <input id="messageInput" placeholder="Type a message..." />
  <button id="sendBtn">Send</button>
  <button id="clearBtn">Clear Chat</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

// ---------------- Password selection ----------------
// User selects either mysecret123 or mysecret345
let user = sessionStorage.getItem('user');
if(!user){
  let choice = prompt("Enter user (mysecret123 or mysecret345):");
  if(choice !== "mysecret123" && choice !== "mysecret345") choice = "mysecret123"; // default
  user = choice;
  sessionStorage.setItem('user', user);
}

// Show input area
document.getElementById('inputArea').style.display = 'flex';

// ---------------- Firebase Config ----------------
const firebaseConfig = {
  apiKey: "AIzaSyD7vdMG0fJ8x68pVVbgwgr6tWWrHIp6Ww8",
  authDomain: "trello-board-da1f2.firebaseapp.com",
  databaseURL: "https://trello-board-da1f2-default-rtdb.firebaseio.com/",
  projectId: "trello-board-da1f2",
  storageBucket: "trello-board-da1f2.appspot.com",
  messagingSenderId: "275400958391",
  appId: "1:275400958391:web:1c9ab00bfe825b31284832"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const chatContainer = document.getElementById('chatContainer');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const logoutBtn = document.getElementById('logoutBtn');
const clearBtn = document.getElementById('clearBtn');

// ---------------- Bubble colors for two users ----------------
const colors = { "mysecret123": "#3b82f6", "mysecret345": "#10b981" };

// ---------------- Send message ----------------
sendBtn.addEventListener('click', () => {
  const text = messageInput.value.trim();
  if(!text) return;
  push(ref(db, 'messages'), { 
    text: text, 
    timestamp: Date.now(), 
    user: user 
  });
  messageInput.value = '';
});

// ---------------- Logout ----------------
logoutBtn.addEventListener('click', () => {
  sessionStorage.removeItem('user');
  location.reload();
});

// ---------------- Clear chat ----------------
clearBtn.addEventListener('click', () => {
  if(confirm("Are you sure you want to clear all messages?")) {
    ref(db,'messages').remove()
      .then(()=>alert("Chat cleared!"))
      .catch(err=>alert("Error: "+err));
  }
});

// ---------------- Real-time messages ----------------
const messagesRef = ref(db,'messages');
onValue(messagesRef, snapshot => {
  const messages = snapshot.val() || {};
  chatContainer.innerHTML = '';
  Object.values(messages)
    .sort((a,b)=>a.timestamp - b.timestamp)
    .forEach(msg => {
      const div = document.createElement('div');
      div.className = 'message';
      div.style.background = colors[msg.user] || "#374151"; // assign color per user
      div.textContent = msg.text;

      const timeSpan = document.createElement('span');
      timeSpan.className = 'time';
      const date = new Date(msg.timestamp);
      timeSpan.textContent = date.getHours().toString().padStart(2,'0') + ':' + date.getMinutes().toString().padStart(2,'0');
      div.appendChild(timeSpan);

      const nameSpan = document.createElement('span');
      nameSpan.className = 'userName';
      nameSpan.textContent = msg.user;
      div.appendChild(nameSpan);

      chatContainer.appendChild(div);
    });
  chatContainer.scrollTop = chatContainer.scrollHeight;
});
</script>

</body>
</html>
