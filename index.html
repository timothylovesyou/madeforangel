<!DOCTYPE html>
<html lang="en">
<head><!---->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp-Style Chat</title>
<style>
/* Reset */
* { box-sizing: border-box; margin:0; padding:0; }
body { font-family: Arial, sans-serif; background:#e5ddd5; display:flex; flex-direction:column; height:100vh; }

/* Header */
header { background:#075E54; color:white; padding:15px; display:flex; justify-content:space-between; align-items:center; }
header h1 { font-size:18px; }
header button { background:#128C7E; color:white; border:none; padding:6px 10px; border-radius:5px; cursor:pointer; }

/* Chat container */
#chatContainer { flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:6px; }

/* Message bubbles */
.message { max-width: 70%; padding:10px; border-radius:10px; position:relative; word-wrap:break-word; font-size:14px; }
.message .time { font-size:10px; color:rgba(0,0,0,0.45); position:absolute; bottom:2px; right:6px; }
.sent { align-self:flex-end; background:#dcf8c6; border-bottom-right-radius:0; }
.received { align-self:flex-start; background:#fff; border-bottom-left-radius:0; }

/* Input area */
#inputArea { display:flex; padding:10px; background:#f0f0f0; }
#messageInput { flex:1; padding:10px; border-radius:20px; border:none; outline:none; }
#sendBtn, #clearBtn { margin-left:5px; padding:10px 12px; border:none; border-radius:20px; background:#128C7E; color:white; cursor:pointer; }
#clearBtn { background:#c0392b; }
@media(max-width:500px){ header h1{ font-size:16px; } }
</style>
</head>
<body>

<header>
  <h1>Private Chat</h1>
  <div>
    <button id="logoutBtn">Logout</button>
    <button id="clearBtn">Clear Chat</button>
  </div>
</header>

<div id="chatContainer"></div>

<div id="inputArea">
  <input type="text" id="messageInput" placeholder="Type a message...">
  <button id="sendBtn">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

// ---------------- User login ----------------
let user = sessionStorage.getItem('user');
while(!user || (user !== "mysecret123" && user !== "mysecret345")) {
  user = prompt("Enter Password");
}
sessionStorage.setItem('user', user);

// ---------------- Firebase ----------------
const firebaseConfig = {
  apiKey: "AIzaSyD7vdMG0fJ8x68pVVbgwgr6tWWrHIp6Ww8",
  authDomain: "trello-board-da1f2.firebaseapp.com",
  databaseURL: "https://trello-board-da1f2-default-rtdb.firebaseio.com/",
  projectId: "trello-board-da1f2",
  storageBucket: "trello-board-da1f2.appspot.com",
  messagingSenderId: "275400958391",
  appId: "1:275400958391:web:1c9ab00bfe825b31284832"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const chatContainer = document.getElementById('chatContainer');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const logoutBtn = document.getElementById('logoutBtn');
const clearBtn = document.getElementById('clearBtn');

const colors = { "mysecret123":"#dcf8c6", "mysecret345":"#fff" };

// Clear chat only for mysecret345
if(user!=="mysecret345") clearBtn.style.display='none';

// ---------------- Send message ----------------
sendBtn.addEventListener('click', ()=>{
  const text = messageInput.value.trim();
  if(!text) return;
  push(ref(db,'messages'), { text:text, user:user, timestamp: Date.now() });
  messageInput.value='';
});

// ---------------- Logout ----------------
logoutBtn.addEventListener('click', ()=>{
  sessionStorage.removeItem('user');
  location.reload();
});

// ---------------- Clear Chat ----------------
clearBtn.addEventListener('click', ()=>{
  if(confirm("Are you sure to clear chat?")) remove(ref(db,'messages'));
});

// ---------------- Real-time messages ----------------
const messagesRef = ref(db,'messages');
onValue(messagesRef, snapshot=>{
  const messages = snapshot.val()||{};
  chatContainer.innerHTML='';
  Object.values(messages).sort((a,b)=>a.timestamp-b.timestamp).forEach(msg=>{
    const div = document.createElement('div');
    div.className='message '+(msg.user===user?'sent':'received');
    div.style.background = colors[msg.user] || "#fff";
    div.textContent = msg.text;

    const span = document.createElement('span');
    span.className='time';
    const date = new Date(msg.timestamp);
    span.textContent = date.getHours().toString().padStart(2,'0')+':'+date.getMinutes().toString().padStart(2,'0');
    div.appendChild(span);

    chatContainer.appendChild(div);
  });
  chatContainer.scrollTop = chatContainer.scrollHeight;
});
</script>
</body>
</html>
