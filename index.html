<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Private Firebase Message Board</title>
<style>
body{
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 30px;
}
.board{
  display: flex;
  flex-direction: column-reverse; /* newest first */
  gap: 10px;
  max-width: 500px;
}
.card{
  background: #1e293b;
  color: white;
  padding: 10px;
  border-radius: 6px;
  word-wrap: break-word;
}
input{
  padding: 6px;
  width: 300px;
  border-radius: 4px;
  border: none;
  margin-right: 5px;
}
button{
  padding: 8px 12px;
  background: #3b82f6;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>Private Firebase Message Board</h1>

<div id="board" class="board" style="display:none;"></div>

<div id="inputArea" style="margin-top:20px; display:none;">
  <input id="messageInput" placeholder="Type your message..." />
  <button id="sendBtn">Send</button>
</div>

<script type="module">
  // Import modular SDK
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

  // ---------------- Password with session ----------------
  const PASSWORD = "mysecret123"; // change this
  let loggedIn = sessionStorage.getItem('loggedIn');

  if(!loggedIn){
    let userPassword = prompt("Enter password to access the board:");
    if(userPassword === PASSWORD){
      sessionStorage.setItem('loggedIn', 'true');
      loggedIn = 'true';
    } else {
      alert("Incorrect password! Access denied.");
      throw new Error("Access denied");
    }
  }

  if(loggedIn === 'true'){
    document.getElementById('board').style.display = 'flex';
    document.getElementById('inputArea').style.display = 'block';
  }

  // ---------------- Firebase Config ----------------
  const firebaseConfig = {
    apiKey: "AIzaSyD7vdMG0fJ8x68pVVbgwgr6tWWrHIp6Ww8",
    authDomain: "trello-board-da1f2.firebaseapp.com",
    projectId: "trello-board-da1f2",
    storageBucket: "trello-board-da1f2.firebasestorage.app",
    messagingSenderId: "275400958391",
    appId: "1:275400958391:web:1c9ab00bfe825b31284832",
    measurementId: "G-1TGH7ZEB6J"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const boardEl = document.getElementById('board');
  const inputEl = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');

  // ---------------- Send Message ----------------
  sendBtn.addEventListener('click', () => {
    const text = inputEl.value.trim();
    if (!text) return;
    push(ref(db, 'messages'), { text: text, timestamp: Date.now() });
    inputEl.value = '';
  });

  // ---------------- Real-time Messages ----------------
  const messagesRef = ref(db, 'messages');
  onValue(messagesRef, snapshot => {
    const messages = snapshot.val() || {};
    boardEl.innerHTML = '';
    Object.values(messages)
      .sort((a,b) => b.timestamp - a.timestamp) // newest first
      .forEach(msg => {
        const div = document.createElement('div');
        div.className = 'card';
        div.textContent = msg.text;
        boardEl.appendChild(div);
      });
  });
</script>

</body>
</html>
